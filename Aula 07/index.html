<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="text" placeholder="Digite seu nome... " id="nome"> <!--usa-se placeholder para colocar o texto dentro do input--> <!--O id é para conseguir buscar o dado no js-->
    <script src="script.js"></script>
    <button onclick="exibirNome()">Enviar</button> <!--O onclick serve para fazer com que a função funcione ao ser apertado o botão--> <!--lembrar de coloca o parenteses pro código entender que é uma função-->
    <div>
        <input type="text" id="valorA" placeholder="valor A">
        <input type="text" id="valorB" placeholder="valor B">
        <button onclick="Somar()">Somar</button>
    </div>
    <div>
        <input type="text" id="valorC" placeholder="valor C">
        <input type="text" id="valorD" placeholder="valor D">
        <button onclick="Mult()">Multiplicação</button>
    </div>
    <div>
        <input type="text" id="valorE" placeholder="valor C">
        <input type="text" id="valorF" placeholder="valor D">
        <button onclick="Div()">Divisão</button>
    </div>
    <div>
        <input type="text" id="valorG" placeholder="valor G">
        <input type="text" id="valorH" placeholder="valor H">
        <button onclick="Sub()">Subtração</button>
    </div>
</body>
</html>
