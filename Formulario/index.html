<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #657a8b, #1f848a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            background: #fff;
            width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .campo{
            margin-bottom: 15px;
        }

        .campo label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #444;
        }

        .campo input,
        .campo select{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        .campo input:focus,
        .campo select:focus{
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        button{
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #1f8ef1;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>Cadastre-se</h2>

    <form action="salvar_dados.php" method="POST">

        <div class="campo">
            <label for="nome">O seu nome:</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div class="campo">
            <label for="sobrenome">O seu sobrenome:</label>
            <input type="text" id="sobrenome" name="sobrenome" required>
        </div>

        <div class="campo">
            <label for="nome_pai">O nome de seu Pai:</label>
            <input type="text" id="nome_pai" name="nome_pai" required>
        </div>

        <div class="campo">
            <label for="nome_mae">O nome de sua Mãe:</label>
            <input type="text" id="nome_mae" name="nome_mae" required>
        </div>

        <div class="campo">
            <label for="turma">A sua turma:</label>
            <input type="text" id="turma" name="turma" required>
        </div>

        <div class="campo">
            <label for="serie">A sua série:</label>
            <select name="serie" id="serie" required>
                <option value="">Selecione sua série</option>
                <option>1º ano</option>
                <option>2º ano</option>
                <option>3º ano</option>
            </select>
        </div>

        <div class="campo">
            <label for="cpf">O seu CPF:</label>
            <input
                type="text"
                id="cpf"
                name="cpf"
                maxlength="14"
                pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                placeholder="000.000.000-00"
                required>
        </div>

        <button type="submit">Cadastrar</button>

    </form>

</div>

</body>
</html>
